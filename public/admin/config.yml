backend:
  name: github
  repo: lourippe33/Neurofeedback-stress
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Accueil"
        name: "accueil"
        file: "src/content/accueil.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Texte", name: "body", widget: "markdown" }
